<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffeaea, #e0f7f4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      padding: 2rem 2.5rem;
      max-width: 700px;
      width: 90%;
      color: #3a3a3a;
    }
    header h1 {
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
      color: #c0392b;
      text-align: center;
      border-bottom: 2px dashed #f5b7b1;
      padding-bottom: 0.5rem;
    }
    nav {
      text-align: right;
      margin-bottom: 1rem;
    }
    nav a {
      background: #f1948a;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
    }
    nav a:hover {
      background: #cd6155;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 1rem 0;
      vertical-align: top;
    }
    td:first-child {
      font-weight: 600;
      width: 35%;
      color: #6e2c00;
    }
    a {
      color: #117864;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    a:hover {
      color: #0b5345;
      text-decoration: underline;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <main>
    <!-- Navigation bar with Home button -->
    <nav>
      <a href="Home.html">🏠 Home</a>
    </nav>

    <!-- Page header -->
    <header>
      <h1>Contact</h1>
    </header>

    <!-- Contact information table -->
    <section>
      <table>
        <tr>
          <td>Address</td>
          <td>
            123 Sakura Lane<br>
            Flower, Region<br>
            Philippines
          </td>
        </tr>
        <tr>
          <td>Contact Number</td>
          <td><a href="tel:+63234567890">+63 9121231234</a></td>
        </tr>
        <tr>
          <td>Opening Hours</td>
          <td>
            Mon–Fri: 11:00 AM – 10:00 PM<br>
            Saturday-Sunday: Closed
          </td>
        </tr>
        <tr>
          <td>Email Us</td>
          <td><a href="mailto:joeltorre0303@gmail.com">joeltorre0303@gmail.com</a></td>
        </tr>
      </table>
    </section>
  </main>
</body>
</html>
